<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <style>
            @font-face {
                font-family: "Stencil Gothic";
                src: url("../../fonts/StencilGothic.ttf") format("truetype");
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 1200px;
                height: 630px;
                overflow: hidden;
                background: black;
                font-family: "Stencil Gothic", monospace;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }

            .bg {
                position: absolute;
                inset: 0;
                background: url("../photos/daybreaker-iso-crowd.jpeg")
                    center / cover no-repeat;
                filter: grayscale(1) contrast(1.2);
                opacity: 0.35;
            }

            .content {
                position: relative;
                z-index: 1;
                text-align: center;
            }

            .logo {
                width: 120px;
                margin-bottom: 32px;
            }

            h1 {
                font-size: 72px;
                letter-spacing: 12px;
                font-weight: normal;
            }
        </style>
    </head>
    <body>
        <div class="bg"></div>
        <div class="content">
            <img
                src="../../logo/SAYLESS-TRANSPARENT.png"
                alt=""
                class="logo"
            />
            <h1>JOIN THE LIST</h1>
        </div>
    </body>
</html>
