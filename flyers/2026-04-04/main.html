        <style>
            @font-face {
                font-family: "StencilGothic";
                src: url("../../fonts/StencilGothic.ttf") format("truetype");
            }

            @font-face {
                font-family: "MoshraAesthetic";
                src:
                    url("../../fonts/MoshraAesthetic-Regular.otf")
                        format("opentype"),
                    url("../../fonts/MoshraAesthetic-Regular.ttf")
                        format("truetype");
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: #000;
                overflow: hidden;
            }

            .flyer-container {
                position: relative;
                width: 100%;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                padding: 60px 20px;
            }

            /* Warm radial glow — orange core fading to teal edges */
            .flyer-container::before {
                content: "";
                position: absolute;
                top: 45%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 800px;
                height: 800px;
                background: radial-gradient(
                    ellipse at center,
                    rgba(240, 192, 64, 0.45) 0%,
                    rgba(200, 100, 40, 0.2) 35%,
                    transparent 70%
                );
                animation: breathe 6s ease-in-out infinite;
                z-index: 0;
            }

            /* Second glow layer — deeper, offset */
            .flyer-container::after {
                content: "";
                position: absolute;
                top: 55%;
                left: 45%;
                transform: translate(-50%, -50%);
                width: 600px;
                height: 600px;
                background: radial-gradient(
                    circle,
                    rgba(196, 74, 45, 0.3) 0%,
                    rgba(240, 192, 64, 0.12) 40%,
                    transparent 70%
                );
                animation: breathe 6s ease-in-out infinite 3s;
                z-index: 0;
            }

            /* Stars */
            .stars {
                position: absolute;
                inset: 0;
                z-index: 0;
            }

            .star {
                position: absolute;
                width: 2px;
                height: 2px;
                background: rgba(255, 255, 255, 0.6);
                border-radius: 50%;
                box-shadow: 0 0 3px rgba(255, 255, 255, 0.3);
            }

            .star::after {
                content: "";
                position: absolute;
                top: -6px;
                left: -6px;
                width: 14px;
                height: 14px;
                background: radial-gradient(
                    circle,
                    rgba(200, 190, 255, 0.35) 0%,
                    rgba(240, 220, 180, 0.15) 40%,
                    transparent 70%
                );
                border-radius: 50%;
                opacity: 0;
                animation: twinkle var(--duration) ease-in-out infinite
                    var(--delay);
            }

            .star:nth-child(4n)::after {
                background: radial-gradient(
                    circle,
                    rgba(180, 170, 240, 0.3) 0%,
                    rgba(140, 160, 220, 0.1) 40%,
                    transparent 70%
                );
            }

            .star:nth-child(3n)::after {
                background: radial-gradient(
                    circle,
                    rgba(255, 255, 255, 0.3) 0%,
                    rgba(220, 230, 255, 0.1) 40%,
                    transparent 70%
                );
            }

            .star:nth-child(5n) {
                width: 1px;
                height: 1px;
                background: rgba(200, 200, 255, 0.4);
            }

            /* Cross-shaped sparkle */
            .sparkle {
                position: absolute;
                z-index: 0;
            }

            .sparkle::before,
            .sparkle::after {
                content: "";
                position: absolute;
                background: linear-gradient(
                    to bottom,
                    transparent,
                    rgba(220, 210, 255, 0.5),
                    transparent
                );
            }

            .sparkle::before {
                width: 1px;
                height: 20px;
                top: -10px;
                left: 0;
            }

            .sparkle::after {
                width: 20px;
                height: 1px;
                top: 0;
                left: -10px;
                background: linear-gradient(
                    to right,
                    transparent,
                    rgba(220, 210, 255, 0.5),
                    transparent
                );
            }

            .content {
                position: relative;
                z-index: 1;
                text-align: center;
                color: #fff;
            }

            .brand {
                font-family: "StencilGothic", sans-serif;
                font-size: 100px;
                letter-spacing: 15px;
                margin-bottom: 10px;
                animation: warmGlow 4s ease-in-out infinite;
            }

            .event-title {
                display: flex;
                align-items: baseline;
                justify-content: center;
                gap: 15px;
                margin-bottom: 30px;
            }

            .ampersand {
                font-family: "StencilGothic", sans-serif;
                font-size: 48px;
                letter-spacing: 8px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            }

            .friends {
                font-family: "Playfair Display", serif;
                font-style: italic;
                font-size: 72px;
                font-weight: 500;
                letter-spacing: 2px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);

            .event-name {

            .time {

                margin-top: 15px;
                color: rgba(255, 255, 255, 0.7);

            .rsvp {

            }
            .rsvp a {
                font-family: 'StencilGothic', sans-serif;
                font-size: 32px;

                text-decoration: none;
                padding: 15px 50px;

                box-shadow: 0 0 15px rgba(240, 192, 64, 0.1), inset 0 0 15px rgba(240, 192, 64, 0.05);
                border-radius: 12px;
                display: inline-block;
                transition: all 0.3s ease;
                background: transparent;
            }
            .rsvp a:hover {
                background: rgba(240, 192, 64, 0.15);
                border-color: rgba(240, 192, 64, 0.9);
                transform: scale(1.05);
            }

            .divider {
                width: 60px;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    #d4a029,
                    transparent
                );
                margin: 30px auto;
            }

            @keyframes breathe {
                0%,
                100% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
                50% {
                    opacity: 0.5;
                    transform: translate(-50%, -50%) scale(1.15);
                }
            }

            @keyframes warmGlow {
                0%,
                100% {
                    text-shadow:
                        2px 2px 4px rgba(0, 0, 0, 0.8),
                        0 0 40px rgba(196, 74, 45, 0.1);
                }
                50% {
                    text-shadow:
                        2px 2px 4px rgba(0, 0, 0, 0.8),
                        0 0 60px rgba(240, 192, 64, 0.2);
                }
            }

            @keyframes twinkle {
                0%,
                100% {
                    opacity: 0;
                    transform: scale(0.5);
                }
                50% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes sparkle-fade {
                0%,
                100% {
                    opacity: 0.2;
                    transform: scale(0.8);
                }
                50% {
                    opacity: 0.8;
                    transform: scale(1.2);
                }
            }

            .sparkle {
                animation: sparkle-fade var(--duration) ease-in-out infinite
                    var(--delay);
            }

                .date {

                    margin-bottom: 15px;
                }

                .venue-name {
                    font-size: 22px;
                    letter-spacing: 4px;

                .time {
                    font-size: 16px;
                    letter-spacing: 2px;
                    margin-top: 10px;
                }

                .rsvp {
                    margin-top: 25px;
                }
                .rsvp a {
                    font-size: 18px;
                    letter-spacing: 3px;
                    padding: 10px 30px;
                }

                .flyer-container::before {
                    width: 400px;
                    height: 400px;
                }

                .flyer-container::after {
                    width: 300px;
                    height: 300px;
                }
            }
        </style>
