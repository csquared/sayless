<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <title>SAYLESS & Kody Sun</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'StencilGothic';
            src: url('../../fonts/StencilGothic.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .display-container {
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        /* Subtle background glow effect */
        .display-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
        }

        .brand {
            font-family: 'StencilGothic', sans-serif;
            font-size: 180px;
            letter-spacing: 20px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: textGlow 3s ease-in-out infinite;
        }

        .event-title {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 25px;
            margin-bottom: 80px;
        }

        .ampersand {
            font-family: 'StencilGothic', sans-serif;
            font-size: 72px;
            letter-spacing: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .friends {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 96px;
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .ticket-info {
            font-family: 'StencilGothic', sans-serif;
            font-size: 64px;
            letter-spacing: 10px;
            margin-top: 60px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: glitch 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Subtle text glow animation */
        @keyframes textGlow {
            0%, 100% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 255, 255, 0.1);
            }
            50% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 255, 255, 0.2);
            }
        }

        @keyframes glitch {
            0%, 50%, 100% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
                transform: translate(0);
                color: #fff;
            }
            52% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -5px 0 #ff0000, 5px 0 #00ffff;
                transform: translate(-3px, 0);
                color: #ff0000;
            }
            54% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 5px 0 #00ff00, -5px 0 #ff00ff;
                transform: translate(3px, 1px);
                color: #00ffff;
            }
            56% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -3px 0 #0000ff, 3px 0 #ffff00;
                transform: translate(-2px, -1px);
                color: #00ff00;
            }
            58% {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 4px 0 #ff00ff, -4px 0 #00ff00;
                transform: translate(2px, 0);
                color: #fff;
            }
        }
    </style>
</head>
<body>
    <div class="display-container">
        <div class="content">
            <div class="brand">SAYLESS</div>
            <div class="event-title">
                <span class="ampersand">&amp;</span>
                <span class="friends">Kody Sun</span>
            </div>
            <div class="ticket-info">TICKETS $40</div>
        </div>
    </div>
</body>
</html>
