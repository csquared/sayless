<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SAYLESS @ Stardust Garage - March 7, 2026</title>
        <meta
            name="description"
            content="SAYLESS & Kody Sun at Stardust Garage, Austin TX. March 7, 2026."
        />
        <meta property="og:title" content="SAYLESS @ Stardust Garage" />
        <meta
            property="og:description"
            content="SAYLESS & Kody Sun at Stardust Garage, Austin TX. March 7, 2026."
        />
        <meta
            property="og:image"
            content="https://justsayless.xyz/flyers/2026-03-07/flyer-og.png"
        />
        <meta
            property="og:url"
            content="https://justsayless.xyz/shows/2026-03-07/"
        />
        <style>
            @font-face {
                font-family: "Stencil Gothic";
                src: url("../../assets/fonts/StencilGothic.ttf")
                    format("truetype");
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: black;
                color: white;
                font-family: "Stencil Gothic", monospace;
                min-height: 100vh;
                padding: 60px 24px;
            }

            .show-page {
                max-width: 700px;
                margin: 0 auto;
            }

            .back-link {
                display: inline-block;
                color: #666;
                text-decoration: none;
                font-size: 12px;
                letter-spacing: 3px;
                margin-bottom: 60px;
                transition: color 0.2s;
            }

            .back-link:hover {
                color: white;
            }

            .show-header {
                margin-bottom: 48px;
            }

            .show-header h1 {
                font-size: 2.5rem;
                letter-spacing: 6px;
                margin-bottom: 8px;
            }

            .show-meta {
                font-size: 14px;
                letter-spacing: 3px;
                color: #666;
            }

            .show-flyer {
                width: 100%;
                margin-bottom: 48px;
            }

            .show-flyer img {
                width: 100%;
                display: block;
            }

            .show-details {
                margin-bottom: 48px;
            }

            .show-details h2 {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #999;
                margin-bottom: 16px;
            }

            .show-details p {
                font-size: 16px;
                line-height: 1.8;
                letter-spacing: 1px;
                color: #ccc;
            }

            .show-photos {
                margin-bottom: 48px;
            }

            .show-photos h2 {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #999;
                margin-bottom: 16px;
            }

            .photo-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
            }

            .photo-grid img {
                width: 100%;
                aspect-ratio: 1;
                object-fit: cover;
                display: block;
            }

            .photo-grid .wide {
                grid-column: 1 / -1;
                aspect-ratio: 16/9;
            }

            .show-video {
                margin-bottom: 48px;
            }

            .show-video h2 {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #999;
                margin-bottom: 16px;
            }

            .show-video video {
                width: 100%;
                display: block;
            }

            @media (max-width: 480px) {
                .show-header h1 {
                    font-size: 1.8rem;
                    letter-spacing: 4px;
                }

                .photo-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="show-page">
            <a href="/" class="back-link">&larr; BACK</a>

            <div class="show-header">
                <h1>STARDUST GARAGE</h1>
                <div class="show-meta">MARCH 7, 2026 &mdash; AUSTIN, TX</div>
            </div>

            <div class="show-flyer">
                <img
                    src="../../flyers/2026-03-07/flyer-og.png"
                    alt="Stardust Garage flyer"
                />
            </div>

            <div class="show-details">
                <h2>DETAILS</h2>
                <p>
                    SAYLESS & Kody Sun. Austin's newest sound in Austin's newest
                    venue. Kody opens at 9pm, I hop on at 11, we b2b from 1am -
                    5:15am.
                </p>
            </div>

            <div class="show-video">
                <h2>PROMO</h2>
                <video controls preload="metadata">
                    <source
                        src="../../assets/video/stardust-promo.mp4"
                        type="video/mp4"
                    />
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="show-photos">
                <h2>PHOTOS</h2>
                <div class="photo-grid">
                    <img
                        src="../../assets/photos/stardust-chris-mixing.jpg"
                        alt="SAYLESS mixing at Stardust Garage"
                    />
                    <img
                        src="../../assets/photos/stardust-chris-mixing-2.jpg"
                        alt="SAYLESS at the decks"
                    />
                    <img
                        src="../../assets/photos/stardust-chris-and-nico.jpg"
                        alt="Chris and Nico at Stardust"
                    />
                    <img
                        src="../../assets/photos/startdust-chris-and-kody-1.jpg"
                        alt="SAYLESS and Kody Sun"
                    />
                    <img
                        src="../../assets/photos/stardust-everyone-behind-decks.jpg"
                        alt="Everyone behind the decks"
                    />
                    <img
                        src="../../assets/photos/stardust-everyone-behind-decks-2.jpg"
                        alt="Behind the decks"
                    />
                    <img
                        src="../../assets/photos/stardust-djing-point.jpg"
                        alt="SAYLESS DJing"
                    />
                    <img
                        src="../../assets/photos/stardust-portrait-green.jpg"
                        alt="Portrait at Stardust"
                    />
                </div>
            </div>
        </div>
    </body>
</html>
