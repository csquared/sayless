<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <title>SAYLESS @ L'art de Connection - Valentine's Day 2026</title>
        <meta name="description" content="SAYLESS at L'art de Connection, HAVAN, Austin TX. February 14, 2026." />
        <meta property="og:title" content="SAYLESS @ L'art de Connection" />
        <meta property="og:description" content="SAYLESS at L'art de Connection, HAVAN, Austin TX. February 14, 2026." />
        <meta property="og:image" content="https://justsayless.xyz/assets/photos/valentines-solo.JPG" />
        <meta property="og:url" content="https://justsayless.xyz/shows/2026-02-14/" />
        <style>
            @font-face {
                font-family: "Stencil Gothic";
                src: url("../../assets/fonts/StencilGothic.ttf") format("truetype");
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: black;
                color: white;
                font-family: "Stencil Gothic", monospace;
                min-height: 100vh;
                padding: 60px 24px;
            }

            .show-page {
                max-width: 700px;
                margin: 0 auto;
            }

            .back-link {
                display: inline-block;
                color: #666;
                text-decoration: none;
                font-size: 12px;
                letter-spacing: 3px;
                margin-bottom: 60px;
                transition: color 0.2s;
            }

            .back-link:hover {
                color: white;
            }

            .show-header {
                margin-bottom: 48px;
            }

            .show-header h1 {
                font-size: 2.5rem;
                letter-spacing: 6px;
                margin-bottom: 8px;
            }

            .show-meta {
                font-size: 14px;
                letter-spacing: 3px;
                color: #666;
            }

            .show-hero {
                width: 100%;
                margin-bottom: 48px;
            }

            .show-hero img {
                width: 100%;
                display: block;
            }

            .show-details {
                margin-bottom: 48px;
            }

            .show-details h2 {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #999;
                margin-bottom: 16px;
            }

            .show-details p {
                font-size: 16px;
                line-height: 1.8;
                letter-spacing: 1px;
                color: #ccc;
            }

            .show-photos {
                margin-bottom: 48px;
            }

            .show-photos h2 {
                font-size: 1rem;
                letter-spacing: 4px;
                color: #999;
                margin-bottom: 16px;
            }

            .photo-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
            }

            .photo-grid img {
                width: 100%;
                aspect-ratio: 1;
                object-fit: cover;
                display: block;
            }

            @media (max-width: 480px) {
                .show-header h1 {
                    font-size: 1.8rem;
                    letter-spacing: 4px;
                }

                .photo-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="show-page">
            <a href="/" class="back-link">&larr; BACK</a>

            <div class="show-header">
                <h1>L'ART DE CONNECTION</h1>
                <div class="show-meta">FEBRUARY 14, 2026 &mdash; HAVAN, AUSTIN, TX</div>
            </div>

            <div class="show-hero">
                <img src="../../assets/photos/valentines-solo.JPG" alt="SAYLESS at L'art de Connection" />
            </div>

            <div class="show-details">
                <h2>DETAILS</h2>
                <p>
                    Valentine's Day at HAVAN. L'art de Connection.
                </p>
            </div>

            <div class="show-photos">
                <h2>PHOTOS</h2>
                <div class="photo-grid">
                    <img src="../../assets/photos/valentines-main.JPG" alt="SAYLESS at the decks" />
                    <img src="../../assets/photos/valentines-kodyandderek.JPG" alt="Kody and Derek" />
                    <img src="../../assets/photos/valentines-nellie.JPG" alt="Dancing at HAVAN" />
                    <img src="../../assets/photos/valentines-joci.jpeg" alt="L'art de Connection spread" />
                </div>
            </div>
        </div>
    </body>
</html>
